<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="white"/>

  <!-- ===== PIRÁMIDE ===== -->
  <g transform="translate(60, 40)">
    <!-- Nivel 1: Triángulo gris claro -->
    <polygon points="55,0 105,0 80,30" fill="#b8b8b8"/>
    <!-- Nivel 2: Trapecio gris-morado -->
    <polygon points="45,30 115,30 115,65 45,65" fill="#8b7a8b"/>
    <!-- Nivel 3: Trapecio morado con corte diagonal -->
    <path d="M 35,65 L 125,65 L 125,105 L 60,105 L 35,65 Z" fill="#6b556b"/>
    <!-- Nivel 4: Trapecio negro -->
    <polygon points="25,105 135,105 135,150 25,150" fill="#1a1a1a"/>
    <!-- Base S.R.L. -->
    <polygon points="15,150 145,150 135,185 25,185" fill="#1a1a1a"/>
    <text x="80" y="173"
          font-family="Arial, Helvetica, sans-serif"
          font-size="22" font-weight="bold" fill="white"
          text-anchor="middle" letter-spacing="8">S.R.L.</text>
  </g>

  <!-- ===== TEXTO PRINCIPAL ===== -->
  <text x="250" y="135"
        font-family="Arial Black, Arial, sans-serif"
        font-size="90" font-weight="900" fill="#000000"
        letter-spacing="3">ASCENSORES</text>

  <text x="250" y="210"
        font-family="Arial Black, Arial, sans-serif"
        font-size="85" font-weight="900" fill="#000000"
        letter-spacing="15">GALARZA</text>

  <!-- ===== LÍNEA DIVISORIA ===== -->
  <line x1="60" y1="240" x2="1160" y2="240" stroke="#c0c0c0" stroke-width="1.2"/>

  <!-- ===== DIRECCIÓN ===== -->
  <text x="60" y="283"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="44" font-weight="normal" fill="#000000"
        letter-spacing="1.5">AV ENTRE RIOS 1.055 OF N°1</text>

  <text x="60" y="340"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="38" font-weight="normal" font-style="italic"
        fill="#000000">Ciudad Autónoma de Buenos Aires</text>

  <!-- ===== ISLAS MALVINAS (esquina superior derecha) ===== -->
  <!-- Gran Malvina -->
  <path d="M 1090,18 L 1102,14 L 1115,17 L 1122,28 L 1124,42
           L 1120,56 L 1110,66 L 1098,70 L 1084,68 L 1074,58
           L 1070,44 L 1074,30 L 1082,20 Z"
        fill="#1a1a1a"/>
  <!-- Isla Soledad -->
  <path d="M 1128,32 L 1134,20 L 1146,14 L 1160,16 L 1172,26
           L 1180,40 L 1182,56 L 1176,68 L 1163,76 L 1148,78
           L 1134,72 L 1126,58 L 1124,44 Z"
        fill="#1a1a1a"/>
</svg>
